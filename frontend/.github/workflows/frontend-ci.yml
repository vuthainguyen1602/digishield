# DigiShield Frontend CI
#
# NOTE (monorepo-lite): this workflow lives under frontend/.github/ because the
# FE is a self-contained toolchain. In a true monorepo this file moves to the
# repo-root .github/workflows/ and gains a path filter so it only runs when
# frontend code changes:
#
#   on:
#     pull_request:
#       paths: ['frontend/**']
#     push:
#       branches: [main]
#       paths: ['frontend/**']
#
# with `defaults.run.working-directory: frontend` (or `working-directory` per step).

name: frontend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The generated API client is a build artifact (not committed). Generate
      # it before lint/typecheck/build so imports from src/api/generated resolve.
      - name: Generate API client
        run: pnpm gen:api

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
