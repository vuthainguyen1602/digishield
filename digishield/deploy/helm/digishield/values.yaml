image:
  repository: digishield/app
  tag: 0.1.0-SNAPSHOT
  pullPolicy: IfNotPresent

api:
  replicaCount: 2
  profile: api
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # When enabled, an HPA manages replicas (the Deployment's replicas is omitted).
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 0 # 0 = disabled

worker:
  replicaCount: 1
  profile: worker
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

scheduler:
  replicaCount: 1
  profile: scheduler
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

database:
  # On AWS this is the RDS/Aurora PostgreSQL endpoint (set in values-<env>.yaml).
  url: jdbc:postgresql://postgres:5432/digishield
  username: digishield
  # Password is read from a Secret, not values. On AWS the Secret is populated
  # from Secrets Manager via External Secrets (see externalSecrets below).
  existingSecret: digishield-db
  passwordKey: password

redis:
  # On AWS this is the ElastiCache for Redis/Valkey primary endpoint.
  host: redis
  port: 6379
  tls: false
  # Leave existingSecret empty when Redis has no auth (e.g. local/dev in-cluster);
  # set it on AWS (ElastiCache auth token) so REDIS_PASSWORD is injected.
  existingSecret: ""
  passwordKey: auth-token

# External Secrets Operator: pull DB/Redis credentials from AWS Secrets Manager
# into the Secrets the workloads reference. Disabled by default (local/on-prem
# create the Secrets manually); enabled in values-dev.yaml / values-prod.yaml.
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager # a ClusterSecretStore you create on the cluster
    kind: ClusterSecretStore
  # Prefix of the secrets in AWS Secrets Manager, e.g. digishield/dev/db.
  remotePrefix: digishield/dev

flyway:
  enabled: true
  profile: flyway

service:
  type: ClusterIP
  port: 80

# Public ingress for the API. Disabled by default (local/on-prem reach the API
# differently); enabled on AWS so an ALB exposes it as CloudFront's /api origin.
ingress:
  enabled: false
  className: alb
  # Path prefix the API serves under (matches CloudFront's /api/* behavior and
  # the SPA's VITE_API_BASE_URL=/api/v1).
  path: /api
  # Optional host for host-based routing; empty = match all hosts on the ALB.
  host: ""
  # ALB Controller annotations (set per env in values-<env>.yaml).
  annotations: {}
