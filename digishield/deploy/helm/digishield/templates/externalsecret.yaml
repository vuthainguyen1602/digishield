{{- if .Values.externalSecrets.enabled }}
# External Secrets Operator (https://external-secrets.io) syncs credentials from
# AWS Secrets Manager into Kubernetes Secrets that the workloads reference.
# Requires: the operator installed in the cluster + a (Cluster)SecretStore named
# {{ .Values.externalSecrets.secretStoreRef.name }} wired to AWS (via IRSA).
#
# Expected AWS Secrets Manager entries (JSON), per environment:
#   {{ .Values.externalSecrets.remotePrefix }}/db     -> { "password": "..." }
#   {{ .Values.externalSecrets.remotePrefix }}/redis  -> { "auth-token": "..." }
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.database.existingSecret }}
  labels:
    app.kubernetes.io/name: digishield
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.database.existingSecret }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.database.passwordKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.remotePrefix }}/db
        property: password
{{- if .Values.redis.existingSecret }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.redis.existingSecret }}
  labels:
    app.kubernetes.io/name: digishield
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.redis.existingSecret }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.redis.passwordKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.remotePrefix }}/redis
        property: auth-token
{{- end }}
{{- end }}
