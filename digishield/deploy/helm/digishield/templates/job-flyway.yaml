{{- if .Values.flyway.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-flyway
  labels:
    app.kubernetes.io/name: digishield
    app.kubernetes.io/component: flyway
  annotations:
    # Run as a pre-upgrade/pre-install hook so migrations apply before rollout.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: digishield
        app.kubernetes.io/component: flyway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: flyway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--spring.profiles.active={{ .Values.flyway.profile }}"
          env:
            {{- include "digishield.dbEnv" . | nindent 12 }}
            {{- include "digishield.authEnv" . | nindent 12 }}
{{- end }}
