apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-scheduler
  labels:
    app.kubernetes.io/name: digishield
    app.kubernetes.io/component: scheduler
spec:
  # Keep at 1 replica so periodic jobs (@Scheduled) don't run in duplicate.
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: digishield
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: digishield
        app.kubernetes.io/component: scheduler
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scheduler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--spring.profiles.active={{ .Values.scheduler.profile }}"
          env:
            {{- include "digishield.dbEnv" . | nindent 12 }}
            {{- include "digishield.redisEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
