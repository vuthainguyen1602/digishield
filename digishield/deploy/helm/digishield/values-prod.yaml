# PRODUCTION environment overrides (EKS on AWS).
#   helm upgrade --install digishield deploy/helm/digishield -f values-prod.yaml -n digishield-prod
#
# Backing services are AWS-managed, sized for production:
#   PostgreSQL -> Amazon RDS/Aurora PostgreSQL, Multi-AZ
#   Redis      -> Amazon ElastiCache for Redis/Valkey, Multi-AZ
# Credentials come from AWS Secrets Manager via External Secrets.
# Replace the <...> placeholders.

image:
  repository: ghcr.io/vuthainguyen1602/digishield/app
  # tag is set by CI: --set image.tag=sha-<short>
  pullPolicy: IfNotPresent

api:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 65

worker:
  replicaCount: 2
scheduler:
  replicaCount: 1

database:
  # RDS/Aurora writer endpoint for prod (Multi-AZ, private subnet).
  url: jdbc:postgresql://<dhp-prod-db>.<id>.<region>.rds.amazonaws.com:5432/digishield
  username: digishield
  existingSecret: digishield-db
  passwordKey: password

redis:
  # ElastiCache primary endpoint for prod (Multi-AZ, in-transit encryption).
  host: <dhp-prod-redis>.<id>.cache.amazonaws.com
  port: 6379
  tls: true
  existingSecret: digishield-redis
  passwordKey: auth-token

externalSecrets:
  enabled: true
  remotePrefix: digishield/prod

# Internet-facing ALB so CloudFront can reach the API as its /api/* origin.
# Feed the resulting ALB DNS (kubectl get ingress) into Terraform
# backend_api_origin_domain. Set <acm-cert-arn> for HTTPS on the ALB.
ingress:
  enabled: true
  className: alb
  path: /api
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: <acm-cert-arn>
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness

flyway:
  enabled: true
