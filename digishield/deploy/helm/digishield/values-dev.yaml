# DEV environment overrides (EKS on AWS).
#   helm upgrade --install digishield deploy/helm/digishield -f values-dev.yaml -n digishield-dev
#
# Backing services are AWS-managed (NOT in-cluster):
#   PostgreSQL -> Amazon RDS for PostgreSQL
#   Redis      -> Amazon ElastiCache for Redis/Valkey
# Credentials come from AWS Secrets Manager via External Secrets (see below);
# only endpoints (non-secret) live here. Replace the <...> placeholders.

image:
  repository: ghcr.io/vuthainguyen1602/digishield/app
  # tag is set by CI: --set image.tag=sha-<short>
  pullPolicy: IfNotPresent

# GHCR is private; CD creates this docker-registry secret before deploy
# (from the GHCR_PULL_TOKEN PAT). See cd.yml / infra/terraform/README.md.
imagePullSecrets:
  - name: ghcr-pull

api:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

worker:
  replicaCount: 1
scheduler:
  replicaCount: 1

database:
  # RDS endpoint for dev (private subnet).
  url: jdbc:postgresql://digishield-dev-db.cpaukmoeotpy.ap-southeast-1.rds.amazonaws.com:5432/digishield
  username: digishield
  existingSecret: digishield-db
  passwordKey: password

redis:
  # ElastiCache primary endpoint for dev.
  host: master.digishield-dev-redis.wqj1m8.apse1.cache.amazonaws.com
  port: 6379
  tls: true
  existingSecret: digishield-redis
  passwordKey: auth-token

externalSecrets:
  enabled: true
  remotePrefix: digishield/dev

# Public HTTPS entry point via ingress-nginx on an NLB with static Elastic IPs.
# DuckDNS (digishield.duckdns.org -> NLB EIP) only supports A records, so an NLB
# with fixed EIPs is used instead of an ALB. TLS terminates at nginx using a
# Let's Encrypt cert (DuckDNS DNS-01), stored in the digishield-tls secret.
ingress:
  enabled: true
  className: nginx
  path: /api
  host: digishield.duckdns.org
  tls:
    - hosts:
        - digishield.duckdns.org
      secretName: digishield-tls
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

flyway:
  enabled: true
