spring:
  application:
    name: digishield

  # Virtual threads (Java 21+ / Loom) for high-concurrency I/O.
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/digishield}
    username: ${DB_USERNAME:digishield}
    password: ${DB_PASSWORD:digishield}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  # Redis (cache). Endpoint from env; the dev profile overrides cache.type=none.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2s
  cache:
    type: ${CACHE_TYPE:redis}

  # Flyway is disabled here: migrations are applied by a dedicated job/profile,
  # not on every application boot. The migration SQL is the single source of
  # truth on the classpath at classpath:db/migration
  # (boot/app/src/main/resources/db/migration).
  flyway:
    enabled: false
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}

# Notification delivery. SES is off by default — notifications are persisted but
# nothing is sent (LoggingNotificationGateway). Enable in prod once the SES
# domain is verified and the pod has IRSA perms (ses:SendEmail).
digishield:
  notifications:
    email:
      from: ${NOTIFICATIONS_EMAIL_FROM:no-reply@digishield.duckdns.org}
      ses:
        enabled: ${NOTIFICATIONS_SES_ENABLED:false}
  # AI: off by default → deterministic StubAiClient (no token cost). Set true and
  # provide ANTHROPIC_API_KEY to route classify/moderate/generate through Claude.
  ai:
    claude:
      enabled: ${AI_CLAUDE_ENABLED:false}

---
# API run mode
spring:
  config:
    activate:
      on-profile: api

---
# Worker run mode
spring:
  config:
    activate:
      on-profile: worker

---
# Scheduler run mode
spring:
  config:
    activate:
      on-profile: scheduler

---
# Flyway migration run mode (used by the migration job)
spring:
  config:
    activate:
      on-profile: flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
