# Backend CI (Spring Boot modular monolith under digishield/)
#
# Monorepo: this workflow lives at the repo-root .github/workflows.
#
# Required-status-check friendly: on PRs the workflow ALWAYS runs (no path
# filter on pull_request) so the final "Backend CI" gate always reports a
# status — even on PRs that don't touch the backend (the heavy jobs are then
# skipped). This avoids the "Expected — waiting for status" deadlock that
# path-filtered required checks cause. Mark "Backend CI" as the required check.

name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "digishield/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write # push the image to GHCR on main

jobs:
  changes:
    name: Detect backend changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.f.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Filter paths
        id: f
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'digishield/**'
              - '.github/workflows/backend-ci.yml'

  build:
    name: Build & Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digishield
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Fast feedback first: unit tests only (no Docker required).
      - name: Run unit tests
        run: ./gradlew test --no-daemon

      # Integration tests (Testcontainers / Docker) + coverage. GitHub's
      # ubuntu-latest runners ship Docker, so Testcontainers works out of the
      # box. `check` also re-runs checkstyle and the jacoco verification.
      - name: Run integration tests, checks & coverage
        run: ./gradlew check jacocoTestReport testCodeCoverageReport --no-daemon

      - name: Upload Checkstyle reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: "digishield/**/build/reports/checkstyle/**"
          if-no-files-found: ignore

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "digishield/**/build/reports/tests/**"
          if-no-files-found: ignore

      # Per-module JaCoCo HTML/XML reports (always uploaded).
      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: "digishield/**/build/reports/jacoco/**"
          if-no-files-found: ignore

      # Single cross-module aggregated coverage report.
      - name: Upload aggregated coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-coverage-report
          path: "digishield/build/reports/jacoco/testCodeCoverageReport/**"
          if-no-files-found: ignore

  image:
    name: Build & push Docker image
    needs: [changes, build]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    # On main: build AND push to GHCR. On PRs: build only (no push, no creds).
    env:
      IMAGE: ghcr.io/${{ github.repository }}/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we are going to push (push events on main).
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # latest + version on main; short SHA always for traceability.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=0.1.0-SNAPSHOT,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          # Build context is the Gradle project root (digishield/), which is
          # what deploy/docker/Dockerfile copies from.
          context: digishield
          file: digishield/deploy/docker/Dockerfile
          # Push only on main pushes; PRs just verify the image builds.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Always-running gate so branch protection has a stable required context.
  # Passes when the backend jobs succeeded OR were skipped (not applicable);
  # fails only when a backend job actually failed/was cancelled.
  backend-ci:
    name: Backend CI
    needs: [changes, build, image]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify backend jobs
        run: |
          echo "changes=${{ needs.changes.result }} build=${{ needs.build.result }} image=${{ needs.image.result }}"
          for r in "${{ needs.changes.result }}" "${{ needs.build.result }}" "${{ needs.image.result }}"; do
            case "$r" in
              failure|cancelled)
                echo "::error::A backend CI job did not pass ($r)."
                exit 1
                ;;
            esac
          done
          echo "Backend CI gate passed (built successfully, or skipped as not applicable)."
