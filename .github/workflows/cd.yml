# CD — single-run, sequential promotion across environments.
#
# Trigger: push to main (i.e. a develop->main PR was merged).
# ONE run flows: build image once -> deploy dev -> deploy production.
# Each stage `needs` the previous, so it's strictly sequential in a single run.
#
# The production deploy is GATED: the "production" GitHub Environment has
# required reviewers, so the run PAUSES at that job until someone approves
# (one "Review deployments -> Approve" click in the run). dev is automatic.
#
# Build-once / promote-same-artifact: the image is built & pushed once (tagged
# with the commit SHA); every environment deploys that exact immutable image.
#
# NOTE: no infrastructure yet -> deploy steps are PLACEHOLDERS. The image IS
# pushed to GHCR; wire the real deploy (Helm / SSH+compose / ArgoCD) in later.

name: cd

on:
  push:
    branches: [main]
    paths:
      - "digishield/**"
      - "deploy/**"
      - ".github/workflows/cd.yml"

permissions:
  contents: read
  packages: write # push image to GHCR

concurrency:
  # Serialize deploys; never cancel an in-flight (possibly half-approved) run.
  group: cd-main
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/app
          tags: |
            type=raw,value=latest
            type=raw,value=0.1.0-SNAPSHOT
            type=sha,format=short

      - name: Build & push image (built once, promoted to every env)
        uses: docker/build-push-action@v6
        with:
          context: digishield
          file: digishield/deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export immutable image ref
        id: ref
        run: echo "image=ghcr.io/${{ github.repository }}/app:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  deploy-dev:
    name: Deploy dev
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: dev
      # url: https://dev.<set-when-infra-exists>
    steps:
      - name: Deploy to dev (placeholder)
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: |
          echo "Deploying $IMAGE to environment: dev"
          echo "TODO: real deploy (Helm/SSH/ArgoCD) once infra exists, e.g.:"
          echo "  helm upgrade --install digishield deploy/helm/digishield -f deploy/helm/digishield/values-dev.yaml --set image.tag=sha-${GITHUB_SHA::7}"

  deploy-prod:
    name: Deploy production
    needs: [build-push, deploy-dev] # sequential after dev; build-push for image ref
    runs-on: ubuntu-latest
    environment:
      name: production # required-reviewer gate: run pauses here for approval
      # url: https://<set-when-infra-exists>
    steps:
      - name: Deploy to production (placeholder)
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: |
          echo "Deploying $IMAGE to environment: production"
          echo "TODO: real deploy (Helm/SSH/ArgoCD) once infra exists, e.g.:"
          echo "  helm upgrade --install digishield deploy/helm/digishield -f deploy/helm/digishield/values-prod.yaml --set image.tag=sha-${GITHUB_SHA::7}"
