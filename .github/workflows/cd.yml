# CD — Continuous Deployment to environments.
#
# Branch -> environment mapping:
#   push to develop  -> environment "dev"        (auto, no approval)
#   push to main     -> environment "production" (GATED: required reviewer approval
#                       configured on the GitHub Environment must approve before the
#                       deploy job runs)
#
# Flow: feature -> PR into develop (deploys dev) -> PR develop->main (deploys prod).
#
# NOTE: no infrastructure is configured yet, so the deploy step is a PLACEHOLDER.
# The image IS built and pushed to GHCR with env-specific tags; wire the real
# deploy (Helm / SSH+compose / PaaS) into the "Deploy" step when infra exists.

name: cd

on:
  push:
    branches: [develop, main]
    paths:
      - "digishield/**"
      - "deploy/**"
      - ".github/workflows/cd.yml"

permissions:
  contents: read
  packages: write # push image to GHCR

concurrency:
  # One deploy per branch at a time; don't cancel an in-flight production deploy.
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/app
          # develop -> :dev ; main -> :prod + :latest + :<version> ; always :<sha>
          tags: |
            type=raw,value=dev,enable=${{ github.ref_name == 'develop' }}
            type=raw,value=prod,enable=${{ github.ref_name == 'main' }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=0.1.0-SNAPSHOT,enable=${{ github.ref_name == 'main' }}
            type=sha,format=short

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: digishield
          file: digishield/deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    # The environment drives the approval gate: "production" has required
    # reviewers, so this job pauses for approval on main; "dev" runs immediately.
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
      # url: https://<set-when-infra-exists>
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (placeholder — no infrastructure configured yet)
        env:
          TARGET_ENV: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
          IMAGE: ghcr.io/${{ github.repository }}/app
        run: |
          echo "Deploying ref '${{ github.ref_name }}' to environment: $TARGET_ENV"
          echo "Image pushed: $IMAGE  (tag: ${{ github.ref_name == 'main' && 'prod' || 'dev' }} / sha-${GITHUB_SHA::7})"
          echo ""
          echo "TODO: replace with a real deploy once infrastructure exists, e.g.:"
          echo "  Kubernetes/Helm:"
          echo "    helm upgrade --install digishield deploy/helm/digishield \\"
          echo "      -f deploy/helm/digishield/values-\$TARGET_ENV.yaml \\"
          echo "      --set image.repository=$IMAGE --set image.tag=${GITHUB_SHA::7}"
          echo "  VPS / SSH + compose:"
          echo "    ssh \$DEPLOY_HOST 'docker compose -f deploy/compose/docker-compose.yml pull && \\"
          echo "      docker compose -f deploy/compose/docker-compose.yml up -d'"
          echo ""
          echo "Frontend (frontend/dist) deploy can be added as a sibling job/step."
