# Frontend CD — build the SPA and publish to S3 + CloudFront, promoted dev -> prod.
#
# Trigger: push to main (a develop->main PR was merged) touching the frontend.
# ONE run flows: deploy dev -> deploy production. deploy-prod `needs` deploy-dev,
# so it's strictly sequential; production is GATED by the "production" GitHub
# Environment's required reviewers (the run pauses for one approval click).
#
# Build-per-env (NOT build-once): Vite bakes VITE_API_BASE_URL into the bundle at
# build time, and each environment points at a different API origin, so the SPA
# is rebuilt inside each env job with that environment's VITE_API_BASE_URL.
#
# NOTE: gated by DEPLOY_ENABLED like cd.yml. Until the repo variable is "true"
# (and the S3/CloudFront infra from infra/terraform/frontend_cdn.tf exists), the
# deploy steps are PLACEHOLDERS — the SPA is built & uploaded as a CI artifact.

name: frontend-cd

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docs/DigiShield_openapi.yaml"
      - ".github/workflows/frontend-cd.yml"

permissions:
  contents: read
  id-token: write # OIDC -> assume AWS IAM role for S3 sync + CloudFront invalidation

concurrency:
  # Serialize deploys; never cancel an in-flight (possibly half-approved) run.
  group: frontend-cd-main
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      # url: https://dev.<set-when-infra-exists>
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # The generated API client is a build artifact (not committed) — generate
      # it from ../docs/DigiShield_openapi.yaml before building.
      - name: Generate API client
        run: npm run gen:api

      - name: Build SPA
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      # Until the CDN infra + DEPLOY_ENABLED exist, just keep the build artifact.
      - name: Upload build artifact (placeholder)
        if: vars.DEPLOY_ENABLED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-dev
          path: frontend/dist/**
          if-no-files-found: error

      - name: Configure AWS credentials (OIDC)
        if: vars.DEPLOY_ENABLED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Hashed assets get a long cache; index.html must never be cached so new
      # deploys are picked up immediately. Sync assets first, then index.html.
      - name: Sync to S3
        if: vars.DEPLOY_ENABLED == 'true'
        run: |
          aws s3 sync dist "s3://${{ vars.FRONTEND_BUCKET }}" \
            --delete --exclude index.html \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp dist/index.html "s3://${{ vars.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        if: vars.DEPLOY_ENABLED == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.FRONTEND_DISTRIBUTION_ID }}" \
            --paths "/*"

  deploy-prod:
    name: Deploy production
    needs: deploy-dev # sequential after dev
    runs-on: ubuntu-latest
    environment:
      name: production # required-reviewer gate: run pauses here for approval
      # url: https://<set-when-infra-exists>
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate API client
        run: npm run gen:api

      - name: Build SPA
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload build artifact (placeholder)
        if: vars.DEPLOY_ENABLED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-prod
          path: frontend/dist/**
          if-no-files-found: error

      - name: Configure AWS credentials (OIDC)
        if: vars.DEPLOY_ENABLED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        if: vars.DEPLOY_ENABLED == 'true'
        run: |
          aws s3 sync dist "s3://${{ vars.FRONTEND_BUCKET }}" \
            --delete --exclude index.html \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp dist/index.html "s3://${{ vars.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        if: vars.DEPLOY_ENABLED == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.FRONTEND_DISTRIBUTION_ID }}" \
            --paths "/*"
